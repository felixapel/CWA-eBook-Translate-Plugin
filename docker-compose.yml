# CWA Translate Plugin — recommended setup (proxy-injection mode).
#
# The translator container proxies CWA and injects the overlay into reader
# pages on the fly: stock CWA image, NO template mounts, survives CWA updates.
# Read your library through http://<host>:8084 and the translator UI appears.
# (The classic bind-mount install remains documented in the README under
# "Advanced: bind-mount install".)

services:
  calibre-web:
    # Pinned to a version the overlay is tested against. `latest` can pull a
    # reader rewrite mid-flight; bump this deliberately instead.
    image: crocodilestick/calibre-web-automated:v4.0.6
    container_name: calibre-web-automated
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config/cwa:/config
      - ./books:/calibre-library
      - ./ingest:/cwa-book-ingest
    # No published port needed: read CWA through the translator proxy below.
    # Uncomment to also keep direct (overlay-less) access on :8083.
    # ports:
    #   - "8083:8083"
    restart: unless-stopped
    networks:
      - webnet

  book-translator:
    # Prebuilt multi-arch image (amd64 + arm64). To build from source instead,
    # comment out `image:` and uncomment `build: .`
    image: ghcr.io/felixapel/cwa-ebook-translate-plugin:latest
    # build: .
    container_name: book-translator
    environment:
      # ── Proxy-injection mode ────────────────────────────────────────────
      # Point at the CWA service; remove this line for API-only mode.
      - CWA_UPSTREAM=http://calibre-web-automated:8083

      # ── LLM backend ─────────────────────────────────────────────────────
      - LLM_PROVIDER=local
      - LLM_MODEL=gemma4-12b
      - LLM_API_KEY=
      # For provider=local: OpenAI-compatible endpoint of your LLM. The PATH is
      # always /v1/chat/completions (vLLM, LM Studio, Ollama and Llama.cpp all
      # speak it); only host:PORT changes. Point at the HOST, not this container
      # (host.docker.internal resolves to the host via extra_hosts below).
      #   vLLM      -> typically :8000
      #   LM Studio -> :1234
      #   Ollama    -> :11434
      - BT_LOCAL_URL=http://host.docker.internal:8000/v1/chat/completions
      # Slow local model? Lower concurrency (1-2) is more stable than 3.
      - BT_MAX_CONCURRENT=2
      - BT_TIMEOUT=60
      # Request-wide cost and overload guards. Every value must stay > 0;
      # invalid/unbounded settings fail startup instead of disabling a limit.
      - BT_MAX_UPSTREAM_INFLIGHT=2
      - BT_UPSTREAM_QUEUE_TIMEOUT=2
      - BT_REQUEST_MAX_ATTEMPTS=20
      - BT_REQUEST_MAX_INPUT_BYTES=5000000
      - BT_REQUEST_MAX_OUTPUT_TOKENS=163840
      - BT_REQUEST_DEADLINE_SECONDS=90
      - BT_MAX_UPSTREAM_RESPONSE_BYTES=1048576
      # Optional resilience: fall back to a cloud provider when local fails.
      # - LLM_FALLBACK_PROVIDER=minimax
      # - LLM_FALLBACK_MODEL=MiniMax-M3
      # - LLM_FALLBACK_API_KEY=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/translator:/app/data
    ports:
      - "8084:8080"   # read CWA (with overlay) here
      - "8390:8390"   # direct API access (optional; used by bind-mount installs)
    depends_on:
      - calibre-web
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
