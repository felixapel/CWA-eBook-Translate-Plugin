name: Release

# Gitea is the only release authority. GitHub is a public source mirror and
# must already expose the exact same annotated tag object before publication.
on:
  push:
    tags: ["v*"]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      # Execute the validator from authoritative main, not from a candidate
      # tag that has not yet passed the ancestry and mirror checks.
      - name: Check out trusted release policy
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          path: trusted
          fetch-depth: 1
      - name: Check out candidate tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ gitea.ref }}
          path: candidate
          fetch-depth: 0
      - name: Set up Python
        run: |
          if ! command -v python3 >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends python3
          fi
          python3 --version
      - name: Refresh authoritative main ref
        run: |
          set -eu
          timeout 60 git -C candidate fetch --no-tags origin \
            '+refs/heads/main:refs/remotes/origin/main'
      - name: Validate version, commit, ancestry, and public mirror
        env:
          RELEASE_TAG: ${{ gitea.ref_name }}
          RELEASE_SHA: ${{ gitea.sha }}
        run: |
          python3 trusted/scripts/release_preflight.py \
            --repository candidate \
            --tag "$RELEASE_TAG" \
            --sha "$RELEASE_SHA" \
            --main-ref refs/remotes/origin/main \
            --mirror-url https://github.com/felixapel/CWA-eBook-Translate-Plugin.git

  backend:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        run: |
          if ! command -v python3 >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends python3 python3-pip
          fi
          if ! python3 -m pip --version >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y --no-install-recommends python3-pip
            else
              python3 -m ensurepip --upgrade
            fi
          fi
          python3 --version && python3 -m pip --version
      - name: Install dependencies
        run: >-
          python3 -m pip install --break-system-packages --require-hashes --only-binary=:all: -r requirements.txt
      - name: Audit Python dependencies
        run: |
          set -e
          python3 -m pip install --break-system-packages --require-hashes --only-binary=:all: -r requirements-audit.txt
          python3 -m pip_audit -r requirements.txt --strict --disable-pip --no-deps
      - run: python3 -m py_compile auth.py server.py translator.py cache.py singleflight.py work_budget.py proxy/render_config.py scripts/release_preflight.py scripts/release_image_tags.py scripts/verify_release_attestations.py
      - run: python3 test_translation.py
      - run: python3 test_hardening.py
      - run: python3 -m unittest -v test_work_budget test_provider_budget test_cache_v2 test_context_cache test_singleflight test_auth test_ci_contract test_release_contract test_release_attestations test_supply_chain_contract test_shell_contract test_container_contract test_cleanup_token test_api_schema test_error_privacy test_observability test_proxy_config test_live_scripts

  frontend:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
      - run: node -c static/translator.js
      - run: node -c static/loader.js
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npx playwright install --with-deps --only-shell chromium
      - run: npm run test:e2e

  docker-smoke:
    needs: preflight
    # Docker is available only on the runner's host-capable label.
    runs-on: weebdb-docker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Derive repository-scoped Docker names
        run: sh scripts/ci-docker-names.sh
      - name: Verify Docker daemon
        run: docker version
      - name: Build image
        run: docker build -t "$SMOKE_IMAGE" .
      - name: Exercise independent hardened roles
        run: ./scripts/container-smoke.sh "$SMOKE_IMAGE" "$SMOKE_PREFIX"

  publish:
    needs: [preflight, backend, frontend, docker-smoke]
    # Buildx and registry publication require the host Docker daemon.
    runs-on: weebdb-docker
    env:
      DOCKER_CONFIG: ${{ gitea.workspace }}/.docker-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Isolate registry credentials
        run: |
          mkdir -p "$DOCKER_CONFIG"
          chmod 700 "$DOCKER_CONFIG"
      - name: Install the reviewed Buildx binary
        env:
          BUILDX_VERSION: "v0.35.0"
          BUILDX_COMMIT: "a319e5b15052cf6557ceb666eb8ff6e32380b782"
          BUILDX_SHA256: "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda"
        run: |
          set -eu
          test "$(uname -m)" = x86_64
          if ! command -v curl >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends curl
          fi
          plugin_dir="$DOCKER_CONFIG/cli-plugins"
          plugin="$plugin_dir/docker-buildx"
          mkdir -p "$plugin_dir"
          timeout 120 curl --proto '=https' --tlsv1.2 --fail --location \
            --silent --show-error --output "$plugin" \
            "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64"
          printf '%s  %s\n' "$BUILDX_SHA256" "$plugin" | \
            sha256sum --check --strict
          chmod 0755 "$plugin"
          test "$(docker buildx version)" = \
            "github.com/docker/buildx ${BUILDX_VERSION} ${BUILDX_COMMIT}"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64,amd64
          cache-image: false
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          cache-binary: false
          driver-opts: |
            image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
            network=bridge
          buildkitd-flags: --log-level=info
      - name: Verify release builder authority
        env:
          BUILDER_NAME: ${{ steps.buildx.outputs.name }}
        run: |
          set -eu
          builder_info=$(docker buildx inspect --builder "$BUILDER_NAME")
          flags=$(printf '%s\n' "$builder_info" | \
            sed -n 's/^BuildKit daemon flags:[[:space:]]*//p')
          version=$(printf '%s\n' "$builder_info" | \
            sed -n 's/^BuildKit version:[[:space:]]*//p')
          test "$flags" = \
            "--log-level=info --allow-insecure-entitlement=network.host"
          test "$version" = "v0.30.0"
          printf '%s\n' "$builder_info" | grep -F 'network="bridge"' >/dev/null
      - name: Ensure release tag renderer is available
        run: |
          if ! command -v python3 >/dev/null 2>&1 || \
             ! command -v envsubst >/dev/null 2>&1; then
            apt-get update && \
              apt-get install -y --no-install-recommends python3 gettext-base
          fi
          python3 --version && envsubst --version
      - name: Authenticate registries and derive tags
        id: registries
        env:
          RELEASE_TAG: ${{ gitea.ref_name }}
          GHCR_IMAGE: ghcr.io/felixapel/cwa-ebook-translate-plugin
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -eu
          if [ -z "$GHCR_USERNAME" ] || [ -z "$GHCR_TOKEN" ]; then
            echo "GHCR_USERNAME and GHCR_TOKEN are required" >&2
            exit 1
          fi
          if { [ -n "$DOCKERHUB_USERNAME" ] && [ -z "$DOCKERHUB_TOKEN" ]; } || \
             { [ -z "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; }; then
            echo "Docker Hub credentials must be both set or both absent" >&2
            exit 1
          fi

          printf '%s' "$GHCR_TOKEN" | \
            docker login ghcr.io --username "$GHCR_USERNAME" --password-stdin
          set -- --tag "$RELEASE_TAG" --image "$GHCR_IMAGE"
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            printf '%s' "$DOCKERHUB_TOKEN" | \
              docker login docker.io --username "$DOCKERHUB_USERNAME" --password-stdin
            set -- "$@" --image \
              "docker.io/${DOCKERHUB_USERNAME}/cwa-ebook-translate-plugin"
          fi

          TAGS=$(python3 scripts/release_image_tags.py "$@")
          IMAGES=$GHCR_IMAGE
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            IMAGES=$(printf '%s\n%s' "$IMAGES" \
              "docker.io/${DOCKERHUB_USERNAME}/cwa-ebook-translate-plugin")
          fi
          {
            echo 'tags<<RELEASE_TAGS'
            printf '%s\n' "$TAGS"
            echo 'RELEASE_TAGS'
            echo 'images<<RELEASE_IMAGES'
            printf '%s\n' "$IMAGES"
            echo 'RELEASE_IMAGES'
          } >> "$GITHUB_OUTPUT"
      - name: Build once and publish every registry tag
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          # BuildKit fetches the verified public mirror by immutable commit.
          # A local path context would expose only unverified VCS hints in SLSA.
          context: "https://github.com/felixapel/CWA-eBook-Translate-Plugin.git#${{ gitea.sha }}"
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ steps.registries.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/felixapel/CWA-eBook-Translate-Plugin
            org.opencontainers.image.version=${{ gitea.ref_name }}
            org.opencontainers.image.revision=${{ gitea.sha }}
          provenance: mode=max
          sbom: generator=docker.io/docker/buildkit-syft-scanner@sha256:79e7b013cbec16bbb436f312819a49a4a57752b2270c1a9332ae1a10fcc82a68
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"
      - name: Sign digest and verify release policy
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          RELEASE_DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_IMAGES: ${{ steps.registries.outputs.images }}
          RELEASE_TAGS: ${{ steps.registries.outputs.tags }}
          RELEASE_SHA: ${{ gitea.sha }}
          RELEASE_TAG: ${{ gitea.ref_name }}
          SOURCE_REPOSITORY: https://github.com/felixapel/CWA-eBook-Translate-Plugin.git
          GHCR_IMAGE: ghcr.io/felixapel/cwa-ebook-translate-plugin
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -eu
          umask 077
          if [ -z "$COSIGN_PRIVATE_KEY" ] || [ -z "$COSIGN_PASSWORD" ] || \
             [ -z "$COSIGN_PUBLIC_KEY" ]; then
            echo "COSIGN_PRIVATE_KEY, COSIGN_PASSWORD, and COSIGN_PUBLIC_KEY are required" >&2
            exit 1
          fi
          if [ "${#RELEASE_DIGEST}" -ne 71 ]; then
            echo "build action did not return a sha256 digest" >&2
            exit 1
          fi
          digest_hex=${RELEASE_DIGEST#sha256:}
          case "$digest_hex" in
            ''|*[!0-9a-f]*)
              echo "build action returned an invalid digest" >&2
              exit 1
              ;;
          esac

          base_image=$(sed -n \
            '1s/^FROM \([^@ ][^@ ]*\)@sha256:[0-9a-f]\{64\}$/\1/p' Dockerfile)
          base_digest=$(sed -n \
            '1s/^FROM [^@ ][^@ ]*@sha256:\([0-9a-f]\{64\}\)$/\1/p' Dockerfile)
          if [ -z "$base_image" ] || [ "${#base_digest}" -ne 64 ]; then
            echo "Dockerfile must pin one sha256 base digest on line 1" >&2
            exit 1
          fi

          workdir=$(mktemp -d)
          trap 'rm -rf -- "$workdir"' EXIT INT TERM
          printf '%s\n' "$COSIGN_PUBLIC_KEY" > "$workdir/cosign.pub"
          printf '%s\n' "$RELEASE_IMAGES" > "$workdir/images"
          printf '%s\n' "$RELEASE_TAGS" > "$workdir/tags"

          printf '%s\n' "$GHCR_IMAGE" > "$workdir/expected-images"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            printf '%s\n' \
              "docker.io/${DOCKERHUB_USERNAME}/cwa-ebook-translate-plugin" \
              >> "$workdir/expected-images"
          fi
          if ! cmp -s "$workdir/images" "$workdir/expected-images"; then
            echo "release image output is empty or does not match configured registries" >&2
            exit 1
          fi

          set -- --tag "$RELEASE_TAG"
          expected_image_count=0
          while IFS= read -r image; do
            [ -n "$image" ] || { echo "blank release image" >&2; exit 1; }
            set -- "$@" --image "$image"
            expected_image_count=$((expected_image_count + 1))
          done < "$workdir/expected-images"
          python3 scripts/release_image_tags.py "$@" > "$workdir/expected-tags"
          if ! cmp -s "$workdir/tags" "$workdir/expected-tags"; then
            echo "release tag output is empty or inconsistent with release policy" >&2
            exit 1
          fi
          expected_tag_count=$(wc -l < "$workdir/expected-tags")

          verified_tag_count=0
          while IFS= read -r tag; do
            [ -n "$tag" ] || { echo "blank release tag" >&2; exit 1; }
            resolved_digest=$(docker buildx imagetools inspect \
              "$tag" --format '{{.Manifest.Digest}}')
            test "$resolved_digest" = "$RELEASE_DIGEST"
            verified_tag_count=$((verified_tag_count + 1))
          done < "$workdir/tags"
          test "$verified_tag_count" -eq "$expected_tag_count"

          signed_image_count=0
          while IFS= read -r image; do
            [ -n "$image" ] || { echo "blank release image" >&2; exit 1; }
            reference="${image}@${RELEASE_DIGEST}"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
              -a "release-tag=$RELEASE_TAG" -a "source-sha=$RELEASE_SHA" "$reference"
            cosign verify --key "$workdir/cosign.pub" \
              -a "release-tag=$RELEASE_TAG" -a "source-sha=$RELEASE_SHA" \
              "$reference" > "$workdir/cosign-verify.json"
            docker buildx imagetools inspect "$reference" \
              --format '{{json .SBOM}}' > "$workdir/sbom.json"
            docker buildx imagetools inspect "$reference" \
              --format '{{json .Provenance}}' > "$workdir/provenance.json"
            python3 scripts/verify_release_attestations.py \
              --sbom "$workdir/sbom.json" \
              --provenance "$workdir/provenance.json" \
              --source-sha "$RELEASE_SHA" \
              --source-repository "$SOURCE_REPOSITORY" \
              --base-image "$base_image" \
              --base-digest "$base_digest" \
              --platform linux/amd64 --platform linux/arm64
            signed_image_count=$((signed_image_count + 1))
          done < "$workdir/images"
          test "$signed_image_count" -eq "$expected_image_count"
      - name: Remove registry credentials
        if: always()
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker logout ghcr.io >/dev/null 2>&1 || true
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            docker logout docker.io >/dev/null 2>&1 || true
          fi
          rm -rf -- "$DOCKER_CONFIG"
