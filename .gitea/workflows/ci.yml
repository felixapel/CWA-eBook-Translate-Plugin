name: CI

# Runs the project's existing self-contained test suites — no live server,
# no API keys, no network calls to an LLM. Compatible with both GitHub
# Actions and Gitea Actions (same workflow syntax).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # actions/setup-python only ships prebuilt interpreters for GitHub's
      # hosted Ubuntu images; in a minimal Gitea job container it fails with
      # "version '3.11' ... was not found for this operating system". Use the
      # platform's own Python instead: already present on GitHub runners,
      # apt-installed in the container otherwise. Both paths give Python 3.11.
      - name: Set up Python
        run: |
          if ! command -v python3 >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends python3 python3-pip
          fi
          # node:*-bookworm ships python3 but no pip module — ensure pip too.
          if ! python3 -m pip --version >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y --no-install-recommends python3-pip
            else
              python3 -m ensurepip --upgrade
            fi
          fi
          python3 --version && python3 -m pip --version
      - name: Install dependencies
        # Debian's system Python is PEP 668 "externally managed"; the flag is
        # safe in this ephemeral CI env and is supported by modern pip on both.
        run: >-
          python3 -m pip install --break-system-packages --require-hashes --only-binary=:all: -r requirements.txt
      - name: Audit Python deps
        # Audit tooling is itself installed from a reviewed hash lock. The
        # runtime lock already lists every transitive dependency, so audit it
        # without invoking a resolver or creating another environment.
        run: |
          set -e
          python3 -m pip install --break-system-packages --require-hashes --only-binary=:all: -r requirements-audit.txt
          python3 -m pip_audit -r requirements.txt --strict --disable-pip --no-deps
      - run: python3 -m py_compile server.py translator.py cache.py work_budget.py
      - run: python3 test_translation.py
      - run: python3 test_hardening.py
      - run: python3 -m unittest -v test_work_budget test_provider_budget test_ci_contract test_release_contract test_supply_chain_contract test_shell_contract test_cleanup_token test_api_schema test_error_privacy

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
      - run: node -c static/translator.js
      - run: node -c static/loader.js
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test

  # Smoke test: build the image, run it, hit /ping, expect 200.
  # Catches Dockerfile regressions (syntax, missing deps, broken entrypoint,
  # USER appuser) that pure Python tests can't. Docker is a required artifact
  # gate: runners without a working daemon fail instead of reporting a green
  # workflow whose build and runtime checks never executed.
  docker-smoke:
    runs-on: ubuntu-latest
    env:
      # Unique per run: shared/self-hosted runners may execute two repos or
      # attempts concurrently. Random loopback ports avoid cross-run clashes.
      SMOKE_CONTAINER: bt-smoke-${{ github.run_id }}-${{ github.run_attempt }}
      SMOKE_IMAGE: bt-audit:${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify Docker daemon
        run: docker version
      - name: Build image
        run: docker build -t "$SMOKE_IMAGE" .
      - name: Run container
        run: |
          docker run -d --name "$SMOKE_CONTAINER" \
            -e CWA_UPSTREAM=http://127.0.0.1:8390 \
            -p 127.0.0.1::8390 -p 127.0.0.1::8080 "$SMOKE_IMAGE"
          API_PORT=$(docker port "$SMOKE_CONTAINER" 8390/tcp | sed 's/.*://')
          PROXY_PORT=$(docker port "$SMOKE_CONTAINER" 8080/tcp | sed 's/.*://')
          test -n "$API_PORT" && test -n "$PROXY_PORT"
          # Poll the browser-facing proxy route, not only the internal API.
          # This proves nginx rendered and started in the shipped image.
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PROXY_PORT}/bt-api/ping" >/dev/null 2>&1; then
              echo "proxy ping ok on try $i"
              break
            fi
            sleep 1
          done
          # Assert both process paths. The proxy response exercises nginx;
          # direct loopback confirms Gunicorn independently for diagnosis.
          curl -sf "http://127.0.0.1:${PROXY_PORT}/bt-api/ping" | grep -q '"status":"ok"'
          curl -sf "http://127.0.0.1:${API_PORT}/ping" | grep -q '"status":"ok"'
      - name: Verify non-root API process
        # The /ping endpoint serves from gunicorn. The `appuser` should own
        # the gunicorn process; the entrypoint (and nginx if it were started)
        # can stay root.
        run: |
          # BusyBox `ps` (Alpine) has no -p flag — list user+args and grep the
          # gunicorn master instead. [g]unicorn avoids matching the grep itself.
          USER=$(docker exec "$SMOKE_CONTAINER" ps -o user,args | grep '[g]unicorn' | head -1 | awk '{print $1}')
          if [ "$USER" = "appuser" ]; then
            echo "gunicorn runs as appuser (unprivileged) — OK"
          else
            echo "gunicorn runs as '$USER', expected appuser"
            docker exec "$SMOKE_CONTAINER" ps -o user,args | head -10
            exit 1
          fi
      - name: Cleanup
        if: always()
        run: docker rm -f "$SMOKE_CONTAINER" 2>/dev/null || true
