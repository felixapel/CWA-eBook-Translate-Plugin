name: Release

# Publishes a multi-arch image to GHCR when a version tag is pushed:
#   git tag v2.0.0 && git push origin v2.0.0
# GitHub-only: the guard below skips this on Gitea Actions (same workflow
# syntax, but no GHCR credentials there). CI tests run in ci.yml on both.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Docker Hub mirror (optional) ────────────────────────────────────
      # Activates automatically once the repo secrets DOCKERHUB_USERNAME and
      # DOCKERHUB_TOKEN exist (Docker Hub -> Account Settings -> Personal
      # access tokens, scope Read/Write). GHCR remains the canonical registry;
      # the Hub mirror exists for discoverability and `docker pull` muscle
      # memory. Buildx layer cache makes this second push nearly free.
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        id: meta_hub
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cwa-ebook-translate-plugin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Push to Docker Hub
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_hub.outputs.tags }}
          labels: ${{ steps.meta_hub.outputs.labels }}

      - name: Sync Docker Hub description
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/cwa-ebook-translate-plugin
          short-description: "Bilingual ebook translation overlay for Calibre-Web-Automated — 100+ languages, local LLMs or cloud APIs"
          readme-filepath: ./README.md
