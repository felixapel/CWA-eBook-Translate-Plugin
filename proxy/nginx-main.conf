# Main nginx configuration for the non-root proxy role. All mutable runtime
# state lives below /tmp, which the recommended Compose file mounts as tmpfs.
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Keep managed access logs useful for health/latency diagnosis without
    # retaining client addresses, User-Agents, cookies, referrers, or URLs.
    log_format bt_privacy
        '$time_iso8601 method=$request_method status=$status '
        'bytes=$body_bytes_sent request_time=$request_time '
        'upstream_status=$upstream_status upstream_time=$upstream_response_time';
    access_log /dev/stdout bt_privacy;
    sendfile on;

    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path /tmp/nginx/proxy_temp;
    fastcgi_temp_path /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path /tmp/nginx/uwsgi_temp;
    scgi_temp_path /tmp/nginx/scgi_temp;

    include /tmp/nginx/proxy.conf;
}
